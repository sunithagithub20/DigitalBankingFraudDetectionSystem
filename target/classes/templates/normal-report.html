<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Normal Transactions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="text-success">✔ Normal Transactions</h2>

<a th:href="@{/dashboard}" class="btn btn-secondary mb-3">Back</a>

<table class="table table-bordered">
    <thead class="table-success">
    <tr>
        <th>ID</th>
        <th>Account</th>
        <th>Amount</th>
        <th>Location</th>
        <th>Risk</th>
        <th>Time</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="txn : ${transactions}">
        <td th:text="${txn.id}"></td>
        <td th:text="${txn.accountNumber}"></td>
        <td th:text="${txn.amount}"></td>
        <td th:text="${txn.location}"></td>
        <td th:text="${txn.riskScore}"></td>
        <td th:text="${txn.transactionTime}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
